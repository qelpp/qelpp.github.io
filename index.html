<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qelp | Gateway</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0D12;
    --surface: #161A23;
    --surface-2: #1D222D;
    --border: #2A3040;
    --cyan: #5BE0D8;
    --magenta: #FF5C8A;
    --amber: #FFC857;
    --discord-blurple: #5865F2;
    --text: #E8EAF0;
    --muted: #8A93A6;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* faint grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    text-align: center;
    background: var(--surface);
    padding: 3rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(91,224,216,0.05);
    max-width: 400px;
    width: 90%;
    position: relative;
    z-index: 2;
    animation: float 4s ease-in-out infinite;
  }

  .container::before {
    content: '';
    position: absolute;
    top: -50%; left: -20%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(91,224,216,0.12), transparent 70%);
    pointer-events: none;
    z-index: -1;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--cyan);
    margin-bottom: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
  }
  .eyebrow .pulse {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 0 0 rgba(91,224,216,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(91,224,216,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(91,224,216,0); }
    100% { box-shadow: 0 0 0 0 rgba(91,224,216,0); }
  }

  .avatar {
    width: 110px;
    height: 110px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin: 0 auto 1.5rem;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar:hover { transform: translateY(-3px); border-color: var(--cyan); }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }
  h1 .accent { color: var(--cyan); }

  p {
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 2rem;
    font-size: 1rem;
  }

  .btn-group { display: flex; flex-direction: column; gap: 0.9rem; }

  .btn {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.9rem 2rem;
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    border: 1px solid var(--border);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    transition: transform 0.15s, border-color 0.2s, background 0.2s, color 0.2s;
  }
  .btn:hover { transform: translateY(-2px); }

  .btn-portfolio {
    background: var(--cyan);
    color: #0B0D12;
    border-color: var(--cyan);
  }
  .btn-portfolio:hover { background: #7CEAE3; }

  .btn-discord {
    background: var(--discord-blurple);
    color: #fff;
    border-color: var(--discord-blurple);
  }
  .btn-discord:hover { background: #4752C4; }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow"><span class="pulse"></span>available for new projects</div>
  <div class="avatar">
    <img src="https://cdn.discordapp.com/avatars/1039914745240752189/54a540cbd4ab5e24539f68178f361790.webp?size=128" alt="Qelp avatar">
  </div>
  <h1>Hi, I'm <span class="accent">Qelp</span></h1>
  <p>Roblox Scripter & Systems Designer.</p>

  <div class="btn-group">
    <a href="https://qelpp.github.io/portfolio/" class="btn btn-portfolio">View Portfolio 🚀</a>
    <a href="https://discord.com/users/1039914745240752189" target="_blank" class="btn btn-discord">Connect on Discord 👾</a>
  </div>
</div>
</body>
</html>
