<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Qelp | Gateway</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #02040A;
    --bg-2: #050B16;
    --surface: rgba(6, 16, 32, 0.88);
    --surface-2: rgba(10, 24, 45, 0.92);

    --border: rgba(120, 165, 230, 0.18);
    --border-strong: rgba(96, 165, 250, 0.48);

    --primary: #1D4ED8;
    --primary-2: #2563EB;
    --primary-3: #60A5FA;
    --accent: #3B82F6;
    --discord: #5865F2;

    --text: #F8FAFC;
    --muted: #64748B;
    --muted-2: #CBD5E1;

    --shadow: 0 30px 100px rgba(0, 0, 0, 0.75);
    --glow: 0 0 34px rgba(29, 78, 216, 0.16);

    --radius: 24px;
    --radius-sm: 16px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    font-family: "Inter", sans-serif;
    background:
      radial-gradient(circle at 18% 0%, rgba(29, 78, 216, 0.10), transparent 22%),
      radial-gradient(circle at 82% 16%, rgba(37, 99, 235, 0.07), transparent 24%),
      linear-gradient(180deg, #02040A, #040B16 42%, #020712 100%);
    color: var(--text);
    display: grid;
    place-items: center;
    overflow: hidden;
    position: relative;
    padding: 24px;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(100, 140, 200, 0.024) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 140, 200, 0.024) 1px, transparent 1px);
    background-size: 68px 68px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.18));
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at var(--mx, 50%) var(--my, 38%), rgba(29, 78, 216, 0.08), transparent 22%);
    pointer-events: none;
    z-index: 0;
    transition: background 0.08s linear;
  }

  .orb {
    position: fixed;
    width: 380px;
    height: 380px;
    border-radius: 999px;
    filter: blur(86px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }

  .orb.one {
    left: -150px;
    top: 16%;
    background: rgba(29, 78, 216, 0.06);
  }

  .orb.two {
    right: -160px;
    bottom: 10%;
    background: rgba(37, 99, 235, 0.045);
    animation-delay: -4s;
  }

  @keyframes drift {
    from {
      transform: translate3d(0, 0, 0) scale(1);
    }

    to {
      transform: translate3d(44px, -34px, 0) scale(1.12);
    }
  }

  .gateway {
    width: min(100%, 470px);
    position: relative;
    z-index: 2;
    background: rgba(6, 16, 32, 0.86);
    border: 1px solid rgba(120, 165, 230, 0.22);
    border-radius: var(--radius);
    box-shadow:
      var(--shadow),
      inset 0 0 0 1px rgba(255, 255, 255, 0.025);
    backdrop-filter: blur(20px);
    overflow: hidden;
    animation: cardIn 0.7s ease both, float 6s ease-in-out infinite 0.8s;
  }

  @keyframes cardIn {
    from {
      opacity: 0;
      transform: translateY(26px) scale(0.98);
    }

    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes float {
    0%, 100% {
      transform: translateY(0);
    }

    50% {
      transform: translateY(-10px);
    }
  }

  .gateway::before {
    content: "";
    position: absolute;
    inset: -2px;
    background:
      radial-gradient(circle at 50% 0%, rgba(29, 78, 216, 0.16), transparent 34%),
      radial-gradient(circle at 0% 90%, rgba(37, 99, 235, 0.08), transparent 30%);
    pointer-events: none;
  }

  .gateway::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.06),
      inset 0 0 0 1px rgba(96, 165, 250, 0.06);
  }

  .content {
    position: relative;
    padding: 34px;
    text-align: center;
  }

  .top-pill {
    width: fit-content;
    margin: 0 auto 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 9px 13px;
    border-radius: 999px;
    border: 1px solid rgba(96, 165, 250, 0.34);
    background: rgba(29, 78, 216, 0.10);
    color: var(--primary-3);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.78rem;
    font-weight: 600;
  }

  .pulse {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #22C55E;
    box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.52);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% {
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.52);
    }

    70% {
      box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
    }

    100% {
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
    }
  }

  .avatar-wrap {
    width: 122px;
    height: 122px;
    margin: 0 auto 22px;
    padding: 4px;
    border-radius: 26px;
    background:
      linear-gradient(135deg, rgba(96, 165, 250, 0.55), rgba(29, 78, 216, 0.10)),
      rgba(6, 16, 32, 0.9);
    box-shadow:
      0 0 38px rgba(29, 78, 216, 0.18),
      0 18px 40px rgba(0, 0, 0, 0.36);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }

  .avatar-wrap:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow:
      0 0 46px rgba(37, 99, 235, 0.28),
      0 24px 54px rgba(0, 0, 0, 0.46);
  }

  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 22px;
    overflow: hidden;
    background:
      radial-gradient(circle at 35% 22%, rgba(96, 165, 250, 0.24), transparent 32%),
      rgba(3, 9, 22, 0.92);
    border: 1px solid rgba(120, 165, 230, 0.22);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-size: clamp(2.15rem, 7vw, 3rem);
    line-height: 1;
    letter-spacing: -0.065em;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .gradient-text {
    background: linear-gradient(135deg, #ffffff, #bfdbfe 48%, #2563EB);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    color: var(--muted-2);
    font-size: 1.02rem;
    line-height: 1.75;
    margin: 0 auto 24px;
    max-width: 340px;
  }

  .mini-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .mini-stat {
    padding: 14px 12px;
    border-radius: 16px;
    border: 1px solid rgba(120, 165, 230, 0.18);
    background: rgba(255, 255, 255, 0.025);
  }

  .mini-stat strong {
    display: block;
    color: var(--text);
    font-size: 1rem;
    letter-spacing: -0.035em;
    margin-bottom: 4px;
  }

  .mini-stat span {
    color: var(--muted);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.72rem;
  }

  .btn-group {
    display: grid;
    gap: 12px;
  }

  .btn {
    min-height: 52px;
    border-radius: 15px;
    text-decoration: none;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: 800;
    letter-spacing: -0.015em;
    border: 1px solid rgba(120, 165, 230, 0.20);
    background: rgba(255, 255, 255, 0.035);
    transition:
      transform 0.2s ease,
      box-shadow 0.2s ease,
      border-color 0.2s ease,
      background 0.2s ease;
  }

  .btn:hover {
    transform: translateY(-3px);
    border-color: rgba(96, 165, 250, 0.58);
    box-shadow:
      0 0 34px rgba(37, 99, 235, 0.18),
      inset 0 0 0 1px rgba(147, 197, 253, 0.08);
  }

  .btn-primary {
    border-color: rgba(96, 165, 250, 0.48);
    background: linear-gradient(135deg, #1D4ED8, #2563EB);
    box-shadow: 0 16px 42px rgba(29, 78, 216, 0.20);
  }

  .btn-primary:hover {
    box-shadow: 0 22px 54px rgba(29, 78, 216, 0.28);
  }

  .btn-discord {
    border-color: rgba(88, 101, 242, 0.55);
    background: linear-gradient(135deg, #4752C4, #5865F2);
    box-shadow: 0 16px 42px rgba(88, 101, 242, 0.18);
  }

  .btn-discord:hover {
    border-color: rgba(150, 160, 255, 0.62);
    box-shadow: 0 22px 54px rgba(88, 101, 242, 0.26);
  }

  .footer-note {
    margin-top: 22px;
    color: var(--muted);
    font-family: "JetBrains Mono", monospace;
    font-size: 0.74rem;
  }

  @media (max-width: 460px) {
    body {
      padding: 14px;
    }

    .content {
      padding: 28px 22px;
    }

    .mini-stats {
      grid-template-columns: 1fr;
    }

    .avatar-wrap {
      width: 108px;
      height: 108px;
      border-radius: 24px;
    }

    .avatar {
      border-radius: 20px;
    }
  }
</style>
</head>

<body>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="gateway">
    <div class="content">
      <div class="top-pill">
        <span class="pulse"></span>
        available for new projects
      </div>

      <div class="avatar-wrap">
        <div class="avatar">
          <img src="Profile.png" alt="Qelp avatar">
        </div>
      </div>

      <h1>Hi, I’m <span class="gradient-text">Qelp</span></h1>

      <p class="subtitle">
        Roblox Scripter & Systems Designer focused on clean, scalable Luau systems.
      </p>

      <div class="mini-stats">
        <div class="mini-stat">
          <strong>2+ yrs</strong>
          <span>Experience</span>
        </div>

        <div class="mini-stat">
          <strong>UTC+3</strong>
          <span>Timezone</span>
        </div>
      </div>

      <div class="btn-group">
        <a href="https://qelpp.github.io/portfolio/" class="btn btn-primary">
          View Portfolio
          <span>↗</span>
        </a>

        <a href="https://discord.com/users/955081753461157968" target="_blank" class="btn btn-discord">
          Connect on Discord
          <span>↗</span>
        </a>
      </div>

      <div class="footer-note">
        Roblox development / backend / gameplay systems
      </div>
    </div>
  </main>

<script>
  const root = document.documentElement;

  window.addEventListener("mousemove", (event) => {
    root.style.setProperty("--mx", `${event.clientX}px`);
    root.style.setProperty("--my", `${event.clientY}px`);
  });
</script>
</body>
</html>
