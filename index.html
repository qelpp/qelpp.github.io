<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qelp | Landing</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --discord-blurple: #5865F2;
    --outline: #1A1A1A;
    --cream: #FFFDF0;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--outline);
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    text-align: center;
    background: white;
    padding: 3rem;
    border: 4px solid var(--outline);
    border-radius: 30px;
    box-shadow: 12px 12px 0 var(--outline);
    animation: float 4s ease-in-out infinite;
    max-width: 400px;
    width: 90%;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid var(--outline);
    margin: 0 auto 1.5rem;
    background: var(--discord-blurple);
    box-shadow: 6px 6px 0 var(--outline);
    overflow: hidden;
    transition: transform 0.3s;
  }

  .avatar:hover { transform: scale(1.1) rotate(5deg); }

  h1 { font-family: 'Fredoka One', cursive; font-size: 2.5rem; margin-bottom: 0.5rem; }
  p { font-weight: 700; color: #555; margin-bottom: 2rem; }

  .btn-group { display: flex; flex-direction: column; gap: 1rem; }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 0.8rem 2rem;
    border: 3px solid var(--outline);
    border-radius: 50px;
    text-decoration: none;
    color: white;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 4px 4px 0 var(--outline);
  }

  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--outline); }

  .btn-portfolio { background: var(--outline); }
  .btn-discord { background: var(--discord-blurple); }

</style>
</head>
<body>

<div class="container">
  <div class="avatar">
    <img src="https://cdn.discordapp.com/avatars/1039914745240752189/54a540cbd4ab5e24539f68178f361790.webp?size=128" style="width:100%">
  </div>
  <h1>Hi, I'm Qelp!</h1>
  <p>Roblox Scripter & Systems Designer.</p>
  
  <div class="btn-group">
    <a href="https://qelpp.github.io/portfolio/" class="btn btn-portfolio">View Portfolio 🚀</a>
    <a href="https://discord.com/users/1039914745240752189" target="_blank" class="btn btn-discord">Connect on Discord 👾</a>
  </div>
</div>

</body>
</html>
